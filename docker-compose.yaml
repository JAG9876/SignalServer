  signalapi:
    image: crawlsoft/signalapi:latest
    container_name: signalapi
    restart: unless-stopped
    depends_on:
        - rabbitmq
    volumes:
        - logs:/app/Logs

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq-node
    restart: unless-stopped
    volumes:
        - rabbitmq_data:/var/lib/rabbitmq

volumes:
    logs:
        
    rabbitmq_data:
      driver: local

